<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>客观题题库练习</title>
  <style>
    :root { --bg:#f7f7fb; --card:#fff; --text:#222; --muted:#667085; --line:#e5e7eb; --brand:#8b1d2c; --ok:#047857; --bad:#b42318; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Microsoft YaHei","PingFang SC","Noto Sans CJK SC","Source Han Sans SC",sans-serif; background:var(--bg); color:var(--text); line-height:1.65; font-synthesis:none; }
    header { padding:24px 16px; text-align:center; }
    h1 { margin:0; font-size:clamp(24px,4vw,36px); }
    .sub { color:var(--muted); margin-top:6px; }
    .wrap { max-width:1100px; margin:0 auto 40px; padding:0 16px; display:grid; grid-template-columns:1fr 300px; gap:16px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:18px; box-shadow:0 10px 24px rgba(0,0,0,.05); }
    .main { padding:22px; }
    .side { padding:18px; align-self:start; position:sticky; top:12px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    button { border:0; border-radius:999px; padding:10px 15px; cursor:pointer; background:#f1f5f9; color:#111; font-size:14px; }
    button.primary { background:var(--brand); color:#fff; }
    button.danger { background:#fee4e2; color:var(--bad); }
    button:disabled { opacity:.5; cursor:not-allowed; }
    .pill { font-size:13px; color:var(--muted); background:#f2f4f7; border-radius:999px; padding:5px 10px; }
    .progress { height:10px; background:#eee; border-radius:999px; overflow:hidden; margin:16px 0; }
    .bar { height:100%; width:0; background:var(--brand); transition:.25s; }
    .question-heading { display:flex; align-items:center; gap:10px; margin:20px 0 10px; }
    .type-badge { display:inline-flex; align-items:center; min-height:32px; padding:4px 13px; border-radius:9px; background:var(--brand); color:#fff; font-size:15px; font-weight:700; letter-spacing:.08em; }
    .stem { white-space:pre-wrap; font-weight:600; font-size:20px; margin:10px 0 20px; font-family:inherit; }
    .options { display:grid; gap:12px; }
    .opt { display:grid; grid-template-columns:32px 1fr; gap:10px; border:1.5px solid var(--line); border-radius:14px; padding:13px 14px; cursor:pointer; background:#fff; white-space:pre-wrap; font-family:inherit; font-size:16px; font-weight:400; }
    .opt b { font-family:inherit; font-weight:700; }
    .opt input { margin-top:7px; accent-color:var(--brand); transform:scale(1.1); }
    .opt.sel { border-color:var(--brand); background:#fff7f7; }
    .opt.correct { border-color:#84c7a7; background:#ecfdf3; }
    .opt.wrong { border-color:#fda29b; background:#fff1f0; }
    .feedback { display:none; margin:16px 0; padding:12px 14px; border-radius:14px; }
    .feedback.ok { display:block; background:#ecfdf3; color:var(--ok); }
    .feedback.bad { display:block; background:#fff1f0; color:var(--bad); }
    .feedback.info { display:block; background:#eff6ff; color:#1d4ed8; }
    .muted { color:var(--muted); }
    .stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:12px 0; }
    .stat { background:#f8fafc; border-radius:12px; padding:12px; }
    .big { font-size:24px; font-weight:800; }
    .wrongItem { padding:10px 0; border-bottom:1px solid var(--line); font-size:14px; }
    .wrongItem b { color:var(--bad); }
    @media(max-width:860px) { .wrap { grid-template-columns:1fr; } .side { position:static; } }
  </style>
</head>
<body>
  <header>
    <h1>客观题题库练习</h1>
    <div class="sub" id="summary">正在加载题库…</div>
  </header>
  <div class="wrap">
    <main class="card main">
      <div class="row" style="justify-content:space-between">
        <div class="row">
          <span class="pill" id="modePill">未做优先</span>
          <span class="pill" id="numPill"></span>
          <span class="pill" id="chapPill"></span>
        </div>
        <div class="row">
          <button id="randomBtn">重新随机</button>
          <button id="wrongBtn">错题练习</button>
        </div>
      </div>
      <div class="progress"><div class="bar" id="bar"></div></div>
      <div class="question-heading"><span class="type-badge" id="typeBadge"></span></div>
      <div class="stem" id="stem">加载中…</div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
      <div class="row" style="margin-top:18px">
        <button class="primary" id="submitBtn" disabled>提交答案</button>
        <button id="nextBtn" disabled>下一题</button>
      </div>
    </main>
    <aside class="card side">
      <h3 style="margin-top:0">练习统计</h3>
      <div class="stats">
        <div class="stat"><div class="muted">已做题目</div><div class="big" id="done">0</div></div>
        <div class="stat"><div class="muted">作答正确率</div><div class="big" id="acc">0%</div></div>
        <div class="stat"><div class="muted">错题</div><div class="big" id="wrongCount">0</div></div>
        <div class="stat"><div class="muted">未做题目</div><div class="big" id="left">0</div></div>
      </div>
      <div class="row">
        <button id="exportBtn">导出错题</button>
        <button id="exportProgressBtn">导出进度</button>
        <button id="importProgressBtn">导入进度</button>
        <input id="progressFile" type="file" accept="application/json,.json" hidden>
        <button class="danger" id="clearBtn">清空错题</button>
      </div>
      <h3>错题记录</h3>
      <div id="wrongList" class="muted">暂无错题</div>
    </aside>
  </div>
  <script src="app.js" defer></script>
</body>
</html>
